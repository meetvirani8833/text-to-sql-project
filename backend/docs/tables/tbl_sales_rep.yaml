table_name: "tbl_sales_rep"

table_description: |
  Pick tbl_sales_rep when the user asks about sales representatives, rep
  performance, who handles which region, or the reporting hierarchy. Typical
  triggers: 'by rep', 'per representative', 'which rep has the most sales',
  "Arjun's orders", 'who manages whom', 'team under a manager', 'reps in a
  region'. tbl_sales_rep links to tbl_order (orders handled by a rep) and to
  tbl_region (the region a rep covers). It is also self-referential — a rep's
  manager_id points to another row in this same table. To reach revenue data,
  also include tbl_order. To reach region data, also include tbl_region.
  Do NOT pick tbl_sales_rep for questions that are purely about customers,
  products, or categories with no mention of reps.

primary_key: "rep_id"

columns:
  - name: "rep_id"
    visualization_name: "Sales Rep ID"
    description: |
      Primary key integer. JOIN key used in:
        tbl_order.rep_id = tbl_sales_rep.rep_id (to link orders to reps)
        tbl_sales_rep.manager_id = tbl_sales_rep.rep_id (self-join for hierarchy)
      Always include when joining this table to tbl_order or when performing
      the manager self-join.

  - name: "rep_name"
    visualization_name: "Sales Rep Name"
    description: |
      DISPLAY + FILTER column. Full name of the sales rep. Use in SELECT to
      show rep names in results. Use in WHERE after entity resolution
      (e.g. WHERE tbl_sales_rep.rep_name = 'Arjun Sharma'). Use in GROUP BY
      for per-rep aggregations.

  - name: "rep_email"
    visualization_name: "Email"
    description: |
      DISPLAY column. Email address of the rep. Include in SELECT only if the
      user explicitly asks for contact details or email.

  - name: "region_id"
    visualization_name: "Region ID"
    description: |
      Foreign key to tbl_region. JOIN key: tbl_sales_rep.region_id =
      tbl_region.region_id. Include when the query needs to filter reps by
      region or show which region a rep covers.

  - name: "manager_id"
    visualization_name: "Manager ID"
    description: |
      Self-referential FK. Points to the rep_id of this rep's direct manager
      within the same table. NULL means this rep is a top-level manager with
      no one above them. For self-join to get manager name:
        JOIN tbl_sales_rep AS mgr ON tbl_sales_rep.manager_id = mgr.rep_id
      Use in WHERE to find direct reports: WHERE manager_id = <rep_id>.
      Include in SELECT when showing the reporting hierarchy.

  - name: "hire_date"
    visualization_name: "Hire Date"
    description: |
      DISPLAY + FILTER column. Date the rep was hired (YYYY-MM-DD). Include in
      SELECT when tenure or hire date is relevant. Use in WHERE for filtering
      by hire date range (e.g. 'reps hired after 2021').

  - name: "status"
    visualization_name: "Rep Status"
    description: |
      FILTER column. 1 = Active rep, 0 = Inactive/resigned. Always add
      WHERE tbl_sales_rep.status = 1 unless inactive reps are explicitly
      requested.

rules:
  - "Always filter WHERE status = 1 unless inactive reps are requested."
  - "To find direct reports of a manager: WHERE manager_id = <manager_rep_id>."
  - "To find a rep's full team including themselves: WHERE rep_id = X OR
    manager_id = X."
  - "manager_id = NULL identifies top-level managers. Include them when the
    user asks about managers or the full hierarchy."
  - "For self-join to display manager names alongside rep names, alias the
    second instance: JOIN tbl_sales_rep mgr ON tbl_sales_rep.manager_id = mgr.rep_id."

relationships:
  - column: "manager_id"
    target_table: "tbl_sales_rep"
    target_column: "rep_id"
    note: "Self-referential: rep reports to another rep (manager)."
  - column: "region_id"
    target_table: "tbl_region"
    target_column: "region_id"
  - column: "rep_id"
    target_table: "tbl_order"
    target_column: "rep_id"
