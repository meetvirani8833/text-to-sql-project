table_name: "tbl_product"

table_description: |
  Pick tbl_product when the user asks about specific products — their details,
  pricing, stock, or which category they belong to. Typical triggers: 'product
  details', 'which products are available', 'price of X', 'stock for Y',
  'products in Electronics', 'launched in 2023', 'discontinued products'.
  tbl_product is the bridge between product categories (tbl_product_category)
  and order line items (tbl_order_item). For revenue or sales data per product,
  also include tbl_order_item and tbl_order. For category-level data, also
  include tbl_product_category. Do NOT pick tbl_product if the user is asking
  about categories with no need for individual product details — in that case
  tbl_product_category alone may suffice.

primary_key: "product_id"

columns:
  - name: "product_id"
    description: |
      Primary key integer. JOIN key used in:
        tbl_order_item.product_id = tbl_product.product_id (to reach sales data)
      Always include when joining tbl_product to tbl_order_item.

  - name: "product_name"
    description: |
      DISPLAY + FILTER column. Full product name used in SELECT to show product
      labels in results. Use in WHERE after entity resolution
      (e.g. WHERE tbl_product.product_name = 'Apple MacBook Air M2'). Use in
      GROUP BY for per-product aggregations.

  - name: "product_sku"
    description: |
      DISPLAY + FILTER column. Alphanumeric stock-keeping unit code
      (e.g. 'ELEC-001', 'GCOL-003'). Include in SELECT when user asks for
      SKUs or product codes. Use in WHERE if user supplies a SKU instead of
      a product name.

  - name: "category_id"
    description: |
      Foreign key to tbl_product_category. JOIN key:
        tbl_product.category_id = tbl_product_category.category_id
      Include when the query needs to filter or group products by category.

  - name: "unit_price"
    description: |
      DISPLAY column. Catalogue list price of the product in INR. Include in
      SELECT when user asks about pricing. Note: the actual sale price for a
      specific order is stored in tbl_order_item.unit_price, which may differ
      due to promotions. Do not use tbl_product.unit_price for revenue
      calculations — use tbl_order_item.line_total instead.

  - name: "stock_qty"
    description: |
      DISPLAY + FILTER column. Current warehouse stock count. Include in SELECT
      when user asks about availability or stock levels. Use in WHERE for
      filtering out-of-stock items (stock_qty = 0) or low-stock items.

  - name: "launch_year"
    description: |
      DISPLAY + FILTER column. Year the product was first introduced. Include
      in SELECT when user asks about when products launched. Use in WHERE to
      filter by launch year (e.g. 'products launched in 2023' →
      WHERE launch_year = 2023).

  - name: "status"
    description: |
      FILTER column. 1 = Active/available for sale, 0 = Discontinued. Always
      add WHERE tbl_product.status = 1 when listing available products. When
      joining for historical revenue analysis, omit this filter so discontinued
      products that were sold historically are still counted.

rules:
  - "Add WHERE status = 1 when listing or searching current products."
  - "Omit the status filter on tbl_product when joining for historical revenue
    analysis — discontinued products may still have order history."
  - "For revenue per product, join to tbl_order_item and SUM(line_total),
    not tbl_product.unit_price."

relationships:
  - column: "category_id"
    target_table: "tbl_product_category"
    target_column: "category_id"
  - column: "product_id"
    target_table: "tbl_order_item"
    target_column: "product_id"
