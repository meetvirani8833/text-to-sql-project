table_name: "tbl_customer"

table_description: |
  Pick tbl_customer when the user asks about customers directly (count, names,
  details, churn) OR whenever the query needs to connect orders to geographic
  or segment dimensions. Typical triggers: 'how many customers', 'customer
  list', 'churned customers', 'customers in Gold segment', 'customers in North
  region', 'cohort 2023', 'customers acquired in 2022'. tbl_customer is the
  central bridge table in this schema — it is required in nearly every query
  that combines order data with region, zone, or segment data. For order data,
  join to tbl_order. For segment data, join to tbl_customer_segment. For region
  data, join to tbl_region. For zone data, join through tbl_region to tbl_zone.
  Always include tbl_customer when the user asks 'by region', 'by segment',
  or 'by zone' and the data source is tbl_order.

primary_key: "customer_id"

columns:
  - name: "customer_id"
    description: |
      Primary key integer. Central JOIN key used in:
        tbl_order.customer_id = tbl_customer.customer_id (orders → customer)
      Always include when joining tbl_customer to tbl_order.

  - name: "customer_name"
    description: |
      DISPLAY column. Full name of the customer. Include in SELECT when the
      user wants to see individual customer names in results. Use in GROUP BY
      only for per-customer breakdowns.

  - name: "customer_code"
    description: |
      DISPLAY + FILTER column. Unique customer reference code ('CUST-0001').
      Include in SELECT when user asks for customer codes or IDs. Use in WHERE
      if user identifies a customer by code.

  - name: "region_id"
    description: |
      Foreign key to tbl_region. JOIN key:
        tbl_customer.region_id = tbl_region.region_id
      Always include when the query needs to group or filter by region, zone,
      or geography. This is the bridge from orders to geographic data.

  - name: "segment_id"
    description: |
      Foreign key to tbl_customer_segment. JOIN key:
        tbl_customer.segment_id = tbl_customer_segment.segment_id
      Always include when the query needs to group or filter by customer loyalty
      tier (Bronze, Silver, Gold, Platinum).

  - name: "cohort_year"
    description: |
      FILTER + DISPLAY column. The calendar year the customer was first
      acquired. Use in WHERE when user asks about customers acquired in a
      specific year (e.g. 'customers from 2022' → WHERE cohort_year = 2022,
      '2023 cohort' → WHERE cohort_year = 2023). Include in SELECT and GROUP BY
      for cohort-level analysis. Do NOT use cohort_year for filtering orders
      by year — use tbl_order.fiscal_year for that.

  - name: "total_lifetime_spend"
    description: |
      DISPLAY + COMPUTATION column. Pre-aggregated total spend in INR across
      all non-cancelled orders for this customer. Use in SELECT and ORDER BY
      when user asks for top spenders or lifetime value without needing a
      live join to tbl_order. For precise real-time totals, compute
      SUM(tbl_order.total_amount) with WHERE order_status != 5 instead.

  - name: "status"
    description: |
      FILTER column. 1 = Active customer, 0 = Churned/inactive. Always add
      WHERE tbl_customer.status = 1 unless the user explicitly asks for churned
      or inactive customers. 'Churned customers' → WHERE status = 0.

rules:
  - "Always filter WHERE status = 1 unless churned or inactive customers
    are explicitly requested."
  - "Always include tbl_customer in queries that join tbl_order with tbl_region,
    tbl_zone, or tbl_customer_segment — it is the required bridge table."
  - "Use cohort_year for customer acquisition year filtering.
    Use tbl_order.fiscal_year for order year filtering. Never swap them."
  - "For quick lifetime value lookups use total_lifetime_spend. For precise
    real-time totals join to tbl_order and SUM(total_amount) WHERE
    order_status != 5."

relationships:
  - column: "region_id"
    target_table: "tbl_region"
    target_column: "region_id"
  - column: "segment_id"
    target_table: "tbl_customer_segment"
    target_column: "segment_id"
  - column: "customer_id"
    target_table: "tbl_order"
    target_column: "customer_id"
