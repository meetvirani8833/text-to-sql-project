services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dfuse_postgres
    ports:
      - "9010:5432"
    environment:
      - POSTGRES_USER=dfuse
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=dfuse_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5
    container_name: dfuse_neo4j
    ports:
      - "9011:7474"
      - "9012:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpass}
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  neo4jdata:
